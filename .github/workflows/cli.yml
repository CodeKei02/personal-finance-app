name: CLI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ github.workspace }}/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - name: Install dependencies
        run: |
          echo "::group::Install dependencies"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      - name: Test
        run: |
          echo "::group::Test"
          pnpm test
          echo "::endgroup::"

      - name: Build
        run: |
          echo "::group::Build"
          pnpm build
          echo "::endgroup::"
